<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Managment System</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

<div id="quiz-container">

    <!-- START SCREEN -->
    <div id="start-screen">
        <h1 class="heading">Welcome To Quiz Management System</h1>
        <p class="bottom">Developed By Zubair - CS Expert</p>

        <input type="text" id="name-input" placeholder="Enter your name">
        <input type="password" id="password-input" placeholder="Enter password">

        <h3>Select Test Type</h3>
        <select id="test-select">
            <option value="">-- Select Test --</option>
            <option value="word">MS Word Test</option>
            <option value="excel">MS Excel Test</option>
            <option value="powerpoint">PowerPoint Test</option>
            <option value="inpage">InPage Test</option>
        </select>

        <button id="start-btn">Start Quiz</button>
    </div>

    <!-- TIMER -->
    <div id="timer" style="display:none;">Time Remaining: 10:00</div>

    <!-- QUIZ SCREEN -->
    <div id="quiz-screen" style="display:none;">
        <h2 id="question-text"></h2>
        <div id="options-container"></div>
        <button id="next-btn">Next</button>
    </div>

    <!-- RESULT SCREEN -->
    <div id="result-screen" style="display:none;"></div>

</div>

<script src="script.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

</body>
</html>
